name: Characters

on:

  workflow_dispatch:

  schedule:

    - cron: "0 * * * *"

jobs:

  post:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5

        with:

          python-version: "3.12"

      - run: pip install -r requirements.txt

      - run: python bot.py

        env:

          WEBHOOK: ${{ secrets.WEBHOOK }}
